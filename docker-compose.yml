version: "3"

services:

  mongodb:
    image: mongo
    container_name: chat_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  redis:
    image: redis
    container_name: chat_redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  mongodb_data: